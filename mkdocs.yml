# MkDocs site for wiki/ → GitHub Pages (https://poirotw66.github.io/daydream/)
site_name: daydream Wiki
site_description: 個人 OKF v0.1 知識庫 — Agent 職涯、Kaggle 實驗、金融 Agent 與每日技術 blog
site_url: https://poirotw66.github.io/daydream/
repo_url: https://github.com/poirotw66/daydream
repo_name: poirotw66/daydream
edit_uri: edit/main/wiki/

docs_dir: wiki

theme:
  name: material
  language: zh-Hant
  logo: assets/daydream-logo.png
  favicon: assets/daydream-logo.png
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  font:
    text: Noto Sans TC
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: 切換至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: 切換至淺色模式
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - content.action.edit
    - content.action.view
    - toc.follow

plugins:
  - search:
      lang:
        - zh
        - en
  - tags

markdown_extensions:
  - meta
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.critic
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

extra_css:
  - stylesheets/extra.css

hooks:
  - docs/mkdocs_hooks.py

nav:
  - 首頁: index.md
  - 說明: wiki-guide.md
  - Projects:
      - "#002 公開法規 Agentic RAG": projects/ideas/2026-06-25-002-公開法規-agentic-rag.md
      - "#003 詐欺調查 Copilot": projects/ideas/2026-06-25-003-詐欺調查-copilot.md
  - Concepts:
      - 雙軌個人架構: concepts/雙軌個人架構.md
      - 研究與知識合成: concepts/研究與知識合成.md
      - 解說式輸出: concepts/解說式輸出.md
      - 貼圖商務自動化: concepts/貼圖商務自動化.md
      - 內容農場變現軌: concepts/內容農場變現軌.md
      - AI CUP 2026 參賽: concepts/ai-cup-2026-參賽.md
      - 桌球戰術時序預測: concepts/桌球戰術時序預測.md
